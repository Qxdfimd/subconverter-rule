mixed-port: 7890 # HTTP(S) 和 SOCKS 代理混合端口

allow-lan: true # 允许局域网连接
bind-address: "*" # 绑定 IP 地址，仅作用于 allow-lan 为 true，'*'表示所有地址
authentication: # http,socks 入口的验证用户名，密码
  - "Qxdfimd:100225lmx"
skip-auth-prefixes: # 设置跳过验证的 IP 段
  - 127.0.0.1/8
  - ::1/128
find-process-mode: strict
mode: rule
geodata-mode: true
#自定义 geodata url
log-level: warning
ipv6: true # 开启 IPv6 总开关，关闭阻断所有 IPv6 链接和屏蔽 DNS 请求 AAAA 记录


# 类似于 /etc/hosts, 仅支持配置单个 IP
hosts:
  dns.google: [8.8.8.8,8.8.4.4,2001:4860:4860::8888,2001:4860:4860::8844]
  dns.alidns.com: [223.5.5.5,223.6.6.6,2400:3200::1,2400:3200:baba::1]
  one.one.one.one: [1.1.1.1,1.0.0.1,2606:4700:4700::1111,2606:4700:4700::1001]
  1dot1dot1dot1.cloudflare-dns.com: [1.1.1.1,1.0.0.1,2606:4700:4700::1111,2606:4700:4700::1001]
  cloudflare-dns.com: [104.16.249.249,104.16.248.249,2606:4700::6810:f8f9,2606:4700::6810:f9f9]
  dns.cloudflare.com: [162.159.61.8,172.64.41.8,2a06:98c1:52::8,2803:f800:53::8]
  dot.pub: [1.12.12.12,120.53.53.53]
  doh.pub: [1.12.12.12,120.53.53.53]
  dns.quad9.net: [9.9.9.9,149.112.112.112,2620:fe::fe,2620:fe::9]
  dns.yandex.net: [77.88.8.8,77.88.8.1,2a02:6b8::feed:0ff,2a02:6b8:0:1::feed:0ff]
  dns.sb: [45.11.45.11,185.222.222.222,2a09::,2a11::]
  dns.umbrella.com: [208.67.220.220,208.67.222.222,2620:119:35::35,2620:119:53::53]
  dns.sse.cisco.com: [208.67.220.220,208.67.222.222,2620:119:35::35,2620:119:53::53]
  engage.cloudflareclient.com: [162.159.192.1,2606:4700:d0::a29f:c001]

profile: # 存储 select 选择记录
  store-selected: true

unified-delay: true # 开启统一延迟时，会计算 RTT，以消除连接握手等带来的不同类型节点的延迟差异

# Tun 配置
tun:
  enable: false
  stack: mixed # system/gvisor/mixed
  auto-detect-interface: true # 自动识别出口网卡
  auto-route: true # 配置路由表
  auto-redirect: false # 自动配置 iptables 以重定向 TCP 连接。仅支持 Linux。带有 auto-redirect 的 auto-route 现在可以在路由器上按预期工作，无需干预。
  strict-route: true # 将所有连接路由到 tun 来防止泄漏，但你的设备将无法其他设备被访问
  dns-hijack:
    - any:53
    - tcp://any:53
  device: utun0
  mtu: 9000 # 最大传输单元
  inet6-address: fdfe:dcba:9876::1/126
  disable-icmp-forwarding: flase # 禁用 ICMP 转发，防止某些情况下的 ICMP 环回问题，ping 将不会显示真实的延迟
  endpoint-independent-nat: false # 启用独立于端点的 NAT
  exclude-package: # 排除被路由的 Android 应用包名
  - com.android.captiveportallogin

# 嗅探域名 可选配置
sniffer:
  enable: true
  ## 对 redir-host 类型识别的流量进行强制嗅探
  ## 如：Tun、Redir 和 TProxy 并 DNS 为 redir-host 皆属于
  force-dns-mapping: true
  ## 对所有未获取到域名的流量进行强制嗅探
  parse-pure-ip: true
  # 是否使用嗅探结果作为实际访问，默认 true
  # 全局配置，优先级低于 sniffer.sniff 实际配置
  override-destination: true
  sniff: # TLS 和 QUIC 默认如果不配置 ports 默认嗅探 443
    QUIC:
      ports: [443,8443]
    TLS:
      ports: [443,8443]
    HTTP:
      ports: [80,8080-8880]
  skip-domain:
    - courier.push.apple.com # iOS 推送通知
    - Mijia Cloud # 米家智能设备
    - dlg.io.mi.com

# DNS 配置
dns:
  cache-algorithm: arc
  enable: true # 关闭将使用系统 DNS
  prefer-h3: false # 是否开启 DoH 支持 HTTP/3，将并发尝试
  listen: 0.0.0.0:53 # 开启 DNS 服务器监听
  ipv6: true # false 将返回 AAAA 的空结果
  # ipv6-timeout: 300 # 单位：ms，内部双栈并发时，向上游查询 AAAA 时，等待 AAAA 的时间，默认 100ms
  # 用于解析 nameserver，fallback 以及其他 DNS 服务器配置的，DNS 服务域名
  # 只能使用纯 IP 地址，可使用加密 DNS
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  enhanced-mode: redir-host
  use-hosts: true # 查询 hosts
  # 配置后面的nameserver、fallback和nameserver-policy向dns服务器的连接过程是否遵守遵守rules规则
  # 如果为false（默认值）则这三部分的dns服务器在未特别指定的情况下会直连
  # 如果为true，将会按照rules的规则匹配链接方式（走代理或直连），如果有特别指定则任然以指定值为准
  # 仅当proxy-server-nameserver非空时可以开启此选项, 强烈不建议和prefer-h3一起使用
  # 此外，这三者配置中的dns服务器如果出现域名会采用default-nameserver配置项解析，也请确保正确配置default-nameserver
  respect-rules: true
  # DNS 主要域名配置
  # 支持 UDP，TCP，DoT，DoH，DoQ
  # 这部分为主要 DNS 配置，影响所有直连，确保使用对大陆解析精准的 DNS
  nameserver:
    - system
  fallback:
    - tcp://1.1.1.1
    = tcp://8.8.8.8
  fallback-filter:
    geoip: true
    geoip-code: CN
  # 专用于节点域名解析的 DNS 服务器，非必要配置项，如果不填则遵循nameserver-policy、nameserver和fallback的配置
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
